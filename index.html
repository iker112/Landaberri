<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP Jangela Landaberri - Login</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* Configuración general (Tus colores se mantienen) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Tu degradado original */
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            padding: 20px;
        }

        /* Botón de idioma arriba a la derecha */
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .language-switcher button {
            background: white;
            border: 1px solid white;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Contenedor del Login */
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-form h2 {
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }

        .login-form p {
            color: #666;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
        }

        /* Inputs más altos para el dedo */
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
            font-size: 16px; /* Evita zoom automático en iPhone */
        }

        .input-group input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
        }

        /* Tu botón verde original */
        .login-btn {
            width: 100%;
            padding: 15px; /* Más alto para móvil */
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #219150;
        }

        /* --- AJUSTES ESPECÍFICOS PARA MÓVIL --- */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px; /* Menos margen lateral para que el cuadro sea más ancho */
                width: 100%;
            }

            .login-form h2 {
                font-size: 1.4rem;
            }

            .language-switcher {
                top: 10px;
                right: 10px;
            }
            
            /* Ajuste de logo en móvil */
            .login-form img {
                width: 50% !important; 
            }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button id="lang-btn" onclick="toggleLanguage()">Euskara</button>
    </div>

    <div class="login-container">
        <form class="login-form">
            <img style="margin: 0 auto; margin-bottom: 20px; display: block;" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBQDAKLJcfbVRZ5H83qWzeyRaEC0FE1a9Wwg&s" alt="Logo" width="40%" height="auto">
            
            <h2 id="title">Bienvenido</h2>
            <p id="subtitle">Por favor, ingresa tus credenciales</p>
            
            <div class="input-group">
                <label for="email" id="label-email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password" id="label-pass">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div id="error-message" style="color: #e74c3c; font-weight: bolder; font-size: 0.85rem; text-align: center; margin-bottom: 15px; display: none;"></div>
            <button type="button" class="login-btn" id="btn-login" onclick="simularLogin()">Iniciar Sesión</button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx3VcJrDqZp8gF_S0cbQkBOf6V940NH1CzoIoQo_zrNhPkbYmGeX21ODvGoxLVXpyiDKg/exec";

        function toggleLanguage() {
            const btn = document.getElementById('lang-btn');
            const isEs = btn.innerText === 'Euskara';

            if (isEs) {
                // Cambiar a Euskara
                document.getElementById('title').innerText = 'Ongi etorri';
                document.getElementById('subtitle').innerText = 'Mesedez, sartu zure datuak';
                document.getElementById('label-email').innerText = 'Posta elektronikoa';
                document.getElementById('label-pass').innerText = 'Pasahitza';
                document.getElementById('btn-login').innerText = 'Saioa hasi';
                btn.innerText = 'Castellano';
            } else {
                // Cambiar a Castellano
                document.getElementById('title').innerText = 'Bienvenido';
                document.getElementById('subtitle').innerText = 'Por favor, ingresa tus credenciales';
                document.getElementById('label-email').innerText = 'Correo Electrónico';
                document.getElementById('label-pass').innerText = 'Contraseña';
                document.getElementById('btn-login').innerText = 'Iniciar Sesión';
                btn.innerText = 'Euskara';
            }
        }

        function simularLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('error-message'); // El nuevo div
            const currentLang = document.getElementById('lang-btn').innerText;

            // Limpiar mensaje de error previo
            errorDiv.style.display = 'none';
            errorDiv.innerText = '';

            if (!email || !password) {
                errorDiv.innerText = currentLang === 'Euskara' ? "Mesedez, bete eremu guztiak" : "Por favor, rellena todos los campos";
                errorDiv.style.display = 'block';
                return;
            }

            btn.innerText = currentLang === 'Euskara' ? "Egiaztatzen..." : "Cargando...";
            btn.disabled = true;

            const callbackName = 'googleCallback';
            
            window[callbackName] = function(data) {
                btn.disabled = false;
                btn.innerText = currentLang === 'Euskara' ? "Saioa hasi" : "Iniciar Sesión";

                if (data.result === "success") {
                    // --- AÑADE ESTA LÍNEA AQUÍ ---
                    localStorage.setItem('userRole', data.role); 
                    // -----------------------------
                    localStorage.setItem('userId', data.student_id);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userSurname', data.surname);
                    localStorage.setItem('userLevel', data.level);
                    
                    // Redirección
                    if (data.role === "admin") {
                        window.location.href = "administratzailea.html";
                    } else if (data.role === "monitor") {
                        window.location.href = "monitorea.html";
                    } else {
                        window.location.href = "ikasleak.html";
                    }
                } else {
                    // ERROR SIN ALERT
                    errorDiv.innerText = currentLang === 'Euskara' ? "Email edo pasahitz okerra" : "Email o contraseña incorrecta";
                    errorDiv.style.display = 'block';
                }
                
                document.body.removeChild(script);
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${WEB_APP_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&callback=${callbackName}`;            
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
