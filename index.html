


<!doctype html>
<html lang="eu" class="h-full">
<!doctype html>
<html lang="eu" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landaberri Ikastola - Jantokia</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        .login-card { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="h-full bg-[#f8fcfb]">
    <header class="w-full p-4 flex justify-between items-center bg-transparent">
        <div class="flex items-center gap-3">
            <div class="bg-[#047857] p-2 rounded-lg shadow-sm">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2L3 9v11a2 2 0 002 2h14a2 2 0 002-2V9l-9-7z" />
                    <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <div>
                <h1 class="text-[#047857] font-extrabold text-lg leading-tight">Landaberri Ikastola</h1>
                <p class="text-gray-400 text-[10px] uppercase tracking-wider">Haur Hezkuntza 2 urte - Jantokia</p>
            </div>
        </div>
        <div class="relative">
            <select class="appearance-none bg-white border border-gray-200 rounded-full px-4 py-1 text-sm font-bold text-gray-600 outline-none pr-8">
                <option>EU</option>
                <option>ES</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
            </div>
        </div>
    </header>

    <main class="flex flex-col items-center justify-center pt-10 px-4">
        <div class="w-full max-w-[440px] bg-white rounded-[2rem] p-10 login-card border border-gray-50/50">
            <div class="flex justify-center mb-6">
                <div class="bg-emerald-50 p-4 rounded-full">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="text-center mb-8">
                <h2 class="text-2xl font-extrabold text-gray-800">Ongi etorri!</h2>
                <p class="text-gray-400 text-sm mt-1">Sartu zure datuak</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Posta elektronikoa</label>
                    <input type="email" id="email" required 
                        class="w-full px-5 py-3.5 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder:text-gray-300" 
                        placeholder="familia@email.com">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Pasahitza</label>
                    <input type="password" id="password" required 
                        class="w-full px-5 py-3.5 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all" 
                        placeholder="��������">
                </div>

                <button type="submit" class="w-full py-4 bg-[#047857] hover:bg-emerald-800 text-white font-bold rounded-2xl shadow-lg shadow-emerald-900/10 transition-all transform active:scale-[0.98]">
                    Sartu
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-xs font-bold text-gray-400 mb-3">Monitorea zara?</p>
                <button class="w-full py-4 bg-[#f1f5f9] hover:bg-gray-200 text-gray-600 font-bold rounded-2xl transition-all">
                    Monitoreen sarrera
                </button>
            </div>
        </div>
    </main>

  <script type="module">
  // 1. Importamos la conexión desde tu archivo central
  import { db } from './firebase-config.js';
  import { ref, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  const loginForm = document.getElementById('login-form');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const emailInput = document.getElementById('email').value;
    const passInput = document.getElementById('password').value;

    const dbRef = ref(db);
    
    try {
      // 2. Consultamos la carpeta 'ikasleak' en tu Firebase
      const snapshot = await get(child(dbRef, 'ikasleak'));
      
      let accesoConcedido = false;

      // 3. Verificamos si los datos coinciden con algún alumno registrado
      if (snapshot.exists()) {
        const usuarios = snapshot.val();
        Object.values(usuarios).forEach(user => {
          if (user.email === emailInput && user.pasahitza === passInput) {
            accesoConcedido = true;
          }
        });
      }

      // 4. Permitimos entrar si los datos son correctos o si es el admin maestro
      if (accesoConcedido || (emailInput === "admin@test.com" && passInput === "1234")) {
        window.location.href = "ikasleak.html";
      } else {
        alert("Erabiltzaile edo pasahitz okerra / Usuario o contraseña incorrectos");
      }
    } catch (error) {
      console.error("Error en el login:", error);
      alert("Errorea konexioan / Error en la conexión con la base de datos");
    }
  });
</script>
</body>
</html>
