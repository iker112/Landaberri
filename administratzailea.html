<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangela - Administratzailea</title>
    <style>

        /* ... (Tus estilos anteriores se mantienen) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .logo { width: 15%; margin-bottom: 10px; }
        h2 { color: #2d3436; text-transform: uppercase; letter-spacing: 1px; }
        .logout-btn { position: absolute; top: 20px; right: 20px; background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav-add-btn { display: block; width: fit-content; background: #3498db; color: white; text-decoration: none; padding: 12px 25px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; margin: 0 auto 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.3s; text-align: center; }
        .nav-add-btn:hover { background: #2980b9; }

        .maila-section { background: white; margin-bottom: 10px; border-radius: 10px; overflow: hidden; }
        .maila-header { padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: white; }
        #hh2 .maila-header { background: #3498db; }
        #hh3 .maila-header { background: #e67e22; }
        #hh4 .maila-header { background: #9b59b6; }
        #hh5 .maila-header { background: #e74c3c; }
        #lh1 .maila-header { background: #2ecc71; }
        #lh2 .maila-header { background: #1abc9c; }

 .header-left-part {
            display: flex;
            align-items: center;
            gap: 12px;
        }

       .btn-edit-maila {
            background: rgba(255, 255, 255, 0.9); /* Blanco sólido para resaltar sobre el color del nivel */
            color: #2d3436; /* Texto oscuro para máxima legibilidad */
            border: none;
            padding: 6px 14px;
            border-radius: 20px; /* Forma de píldora */
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-left: 10px;
        }

        /* Efecto al pasar el ratón: crece un poco */
        .btn-edit-maila:hover {
            transform: scale(1.08);
            background: #ffffff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        /* Efecto al hacer clic: se hunde */
        .btn-edit-maila:active {
            transform: scale(0.95);
        }

        /* Pequeño ajuste para el icono dentro del botón */
        .btn-edit-maila span.icon {
            font-size: 0.9rem;
        }

        .gela-content { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px;
            display: none; 
        }

        /* ESTILOS NUEVOS PARA LA TARJETA Y EL BOTÓN BORRAR */
        .ikasle-card {
            background: #f8f9fa; border: 1px solid #e9ecef;
            padding: 12px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: transform 0.2s;
        }
        .ikasle-card:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ikasle-name { font-weight: 600; font-size: 0.9rem; text-align: left; flex-grow: 1; }
        
        .delete-btn {
            background: #ff4757; color: white; border: none;
            width: 30px; height: 30px; border-radius: 6px;
            cursor: pointer; margin-left: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
        }
        .delete-btn:hover { background: #ff6b81; }

        
            /* --- ESTO SOLO SE ACTIVA EN MÓVIL --- */
        @media (max-width: 600px) {
            /* Ajuste de cabecera: el botón logout ya no pisa el logo */
            header {
                padding: 40px 15px 15px 15px !important;
            }
            
            .logout-btn {
                top: 10px !important;
                right: 10px !important;
                padding: 5px 10px !important;
            }

            .logo {
                width: 60px !important; /* Tamaño fijo para que no baile */
            }

            /* Tarjetas más grandes para el dedo */
            .ikasle-card {
                padding: 15px !important;
                margin-bottom: 10px !important;
            }

            /* Botón de borrar más grande */
            .delete-btn {
                width: 45px !important;
                height: 45px !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <button class="logout-btn" onclick="logout()">Logout</button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBQDAKLJcfbVRZ5H83qWzeyRaEC0FE1a9Wwg&s" alt="Logo" class="logo">
        <h2>Administratzailea</h2>
    </header>

    <div class="container">
        <div id="list-container">
            <div class="maila-section" id="hh2">
                <div class="maila-header" onclick="toggleLevel('hh2')">
                    <div class="header-left-part">
                        <span>HH2 URTE</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('HH2urte')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div>
                    <span class="count" id="count-hh2">0</span>
                </div>
                <div class="gela-content" id="content-hh2"></div>
            </div>

            <div class="maila-section" id="hh3">
                <div class="maila-header" onclick="toggleLevel('hh3')">
                    <div class="header-left-part">
                        <span>HH3 URTE</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('HH3urte')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div>
                    <span class="count" id="count-hh3">0</span>
                </div>
                <div class="gela-content" id="content-hh3"></div>
            </div>

            <div class="maila-section" id="hh4">
                <div class="maila-header" onclick="toggleLevel('hh4')">
                    <div class="header-left-part">
                        <span>HH4 URTE</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('HH4urte')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div>
                    <span class="count" id="count-hh4">0</span>
                </div>
                <div class="gela-content" id="content-hh4"></div>
            </div>

            <div class="maila-section" id="hh5">
                <div class="maila-header" onclick="toggleLevel('hh5')">
                    <div class="header-left-part">
                        <span>HH5 URTE</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('HH5urte')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div> 
                    <span class="count" id="count-hh5">0</span>     
                </div>
                <div class="gela-content" id="content-hh5"></div>
            </div>

            <div class="maila-section" id="lh1">
                <div class="maila-header" onclick="toggleLevel('lh1')">
                    <div class="header-left-part">
                        <span>LH1</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('LH1')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div>
                    <span class="count" id="count-lh1">0</span>
                </div>
                <div class="gela-content" id="content-lh1"></div>
            </div>

            <div class="maila-section" id="lh2">
                <div class="maila-header" onclick="toggleLevel('lh2')">
                    <div class="header-left-part">   
                        <span>LH2</span>
                        <button class="btn-edit-maila" onclick="event.stopPropagation(); editarMenuMaila('LH2')">
                            <span class="icon">🍴</span> MENUA
                        </button>
                    </div>
                    <span class="count" id="count-lh2">0</span>
                </div>
                <div class="gela-content" id="content-lh2"></div>
            </div>
        </div>

        <a href="gehitu.html" class="nav-add-btn">Ikasle Berria Gehitu +</a>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx3VcJrDqZp8gF_S0cbQkBOf6V940NH1CzoIoQo_zrNhPkbYmGeX21ODvGoxLVXpyiDKg/exec";

        window.onload = obtenerIkasleak;

        function toggleLevel(id) {
            const content = document.getElementById('content-' + id);
            content.style.display = (content.style.display === 'grid') ? 'none' : 'grid';
        }

        function obtenerIkasleak() {
            const callbackName = 'adminListCallback';
            window[callbackName] = function(response) {
                renderizarIkasleak(response.students);
                document.body.removeChild(script);
                delete window[callbackName];
            };
            const script = document.createElement('script');
            script.src = `${WEB_APP_URL}?action=getStudents&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        function renderizarIkasleak(students) {
            const niveles = ['hh2', 'hh3', 'hh4', 'hh5', 'lh1', 'lh2'];
            const counts = { hh2: 0, hh3: 0, hh4: 0, hh5: 0, lh1: 0, lh2: 0 };
            niveles.forEach(n => document.getElementById('content-' + n).innerHTML = '');

            students.forEach(student => {
                let levelId = student.class_level.toLowerCase().substring(0, 3);
                if (counts.hasOwnProperty(levelId)) {
                    counts[levelId]++;
                    const container = document.getElementById('content-' + levelId);
                    
                    const card = document.createElement('div');
                    card.className = 'ikasle-card';
                    
                    // Click en la tarjeta -> Ver ficha
                    card.onclick = (e) => {
                        // Si pulsamos el botón de borrar, que no se abra la ficha
                        if(e.target.tagName === 'BUTTON') return;
                        
                        localStorage.setItem('selectedStudentId', student.student_id);
                        localStorage.setItem('userName', student.student_name);
                        localStorage.setItem('userSurname', student.student_surname);
                        localStorage.setItem('userLevel', student.class_level);
                        localStorage.setItem('viewMode', 'monitor');
                        window.location.href = "ikasleak.html";
                    };

                    card.innerHTML = `
                        <div class="ikasle-name">${student.student_name} ${student.student_surname}</div>
                        <button class="delete-btn" onclick="borrarEstudiante('${student.student_id}', '${student.student_name}')">×</button>
                    `;
                    container.appendChild(card);
                }
            });
            niveles.forEach(n => document.getElementById('count-' + n).innerText = counts[n]);
        }

        function borrarEstudiante(id, nombre) {
            if (!confirm(`Ziur zaude ${nombre} ezabatu nahi duzula? (¿Seguro que quieres borrarlo?)`)) return;

            const datos = {
                action: "deleteStudent",
                studentId: id
            };

            // Usamos fetch para borrar
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(datos)
            }).then(() => {
                alert("Ikaslea ezabatu da");
                obtenerIkasleak(); // Recargar la lista
            }).catch(e => alert("Errorea borratzean"));
        }

        function editarMenuMaila(nivel) {
            // Solo guardamos el nivel, que es lo único que necesita menu.html
            localStorage.setItem('class_level', nivel);
            
            // Si quieres diferenciar que es un "modo edición de menú"
            localStorage.setItem('viewMode', 'admin_menu'); 

            window.location.href = "menu.html";
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
